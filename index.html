<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>사다리 타기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;background:#eef0f4;color:#1a1d23;min-height:100vh;padding:28px 16px 56px}
.wrap{max-width:980px;margin:0 auto}

.head{text-align:center;margin-bottom:22px}
.head h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em}
.head h1 em{color:#4f46e5;font-style:normal}
.head p{font-size:13px;color:#8b8f98;margin-top:4px}

.inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-head .t{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#9aa0ab}
.card-head .n{font-size:12px;font-weight:700;color:#4f46e5;background:#eef0fe;padding:2px 9px;border-radius:999px}

.seg{display:inline-flex;background:#f1f2f5;border-radius:9px;padding:3px;margin-bottom:11px;gap:2px}
.seg button{border:none;background:none;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:700;color:#8b8f98;cursor:pointer;font-family:inherit;transition:.12s}
.seg button.on{background:#fff;color:#4f46e5;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.feed{display:flex;gap:8px;margin-bottom:10px}
.feed input{flex:1;padding:9px 12px;border:1px solid #dde0e6;border-radius:9px;font-size:14px;background:#f7f8fa;color:#1a1d23;outline:none;font-family:inherit;transition:.12s}
.feed input:focus{border-color:#4f46e5;background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.feed button{padding:9px 16px;border:none;border-radius:9px;background:#1a1d23;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap}
.feed button:hover{background:#000}
.feed button:active{transform:scale(.96)}

.chips{display:flex;flex-wrap:wrap;gap:6px;min-height:30px}
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px 5px 11px;font-size:13px;font-weight:600}
.chip.p{background:#eef0fe;border:1px solid #c7cbf9;color:#3730a3}
.chip.g{background:#e7f8ef;border:1px solid #a7e8c6;color:#067a4a}
.chip.bang{background:#fdecec;border:1px solid #f5b5b5;color:#c0322f}
.chip x{cursor:pointer;color:rgba(0,0,0,.3);font-style:normal;font-weight:700;font-size:15px;line-height:1}
.chip x:hover{color:#dc2626}
.empty{font-size:12px;color:#b8bcc4;font-style:italic}
.field-hint{font-size:11px;color:#a8acb5;margin-top:8px}

.controls{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.btn{padding:11px 22px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-go{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.btn-go:hover:not(:disabled){background:#4338ca}
.btn-next{background:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.btn-next:hover:not(:disabled){background:#15803d}
.btn-reset{background:#fff;color:#64748b;border:1px solid #dde0e6}
.btn-reset:hover{background:#f1f3f6}
#status{flex:1;min-width:180px;font-size:13px;font-weight:600;color:#475569;background:#fff;border:1px solid #e3e5ea;border-radius:11px;padding:10px 16px;min-height:42px;display:flex;align-items:center;gap:8px}
#status.win{background:#e7f8ef;border-color:#a7e8c6;color:#067a4a}

.stage{background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:8px;overflow:auto;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
canvas{display:block;margin:0 auto}

.results{display:flex;flex-wrap:wrap;gap:8px}
.res{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e3e5ea;border-radius:11px;padding:8px 14px;font-size:13px}
.res .rn{font-weight:800}
.res .arr{color:#c3c7cf}
.res .rg{padding:3px 11px;border-radius:999px;font-size:12px;font-weight:700}
.res .rg.ok{background:#e7f8ef;color:#067a4a;border:1px solid #a7e8c6}
.res .rg.ng{background:#fdecec;color:#c0322f;border:1px solid #f5b5b5}

@media(max-width:580px){.inputs{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>사다리 <em>타기</em></h1>
    <p>인원수만 넣으면 동물이 자동 배정 · 점심값 총액만 넣으면 자동 분배</p>
  </div>

  <div class="inputs">
    <div class="card">
      <div class="card-head"><span class="t">참여자</span><span class="n" id="pn">0</span></div>
      <div class="seg" id="pSeg">
        <button type="button" data-mode="auto" class="on">동물 자동</button>
        <button type="button" data-mode="manual">이름 직접</button>
      </div>
      <div class="feed" id="pAutoFeed">
        <input id="pCount" type="number" min="2" max="10" placeholder="인원수 (2~10)"/>
        <button type="button" id="pGen">동물로 채우기</button>
      </div>
      <div class="feed" id="pManualFeed" style="display:none">
        <input id="pi" type="text" placeholder="이름 입력 후 Enter" maxlength="10" autocomplete="off"/>
        <button type="button" id="pAdd">추가</button>
      </div>
      <div class="chips" id="pchips"><span class="empty">아직 없음</span></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="t">목표 (Goal)</span><span class="n" id="gn">0</span></div>
      <div class="seg" id="gSeg">
        <button type="button" data-mode="money" class="on">점심값 총액</button>
        <button type="button" data-mode="custom">직접 입력</button>
      </div>
      <div class="feed" id="gMoneyFeed">
        <input id="gTotal" type="number" min="0" step="100" placeholder="총액 (예: 50000)"/>
        <button type="button" id="gSplit">자동 분배</button>
      </div>
      <div class="feed" id="gCustomFeed" style="display:none">
        <input id="gi" type="text" placeholder="점심값, 5000원, 꽝…" maxlength="14" autocomplete="off"/>
        <button type="button" id="gAdd">추가</button>
      </div>
      <div class="chips" id="gchips"><span class="empty">부족하면 꽝 자동 추가</span></div>
      <div class="field-hint" id="gHint">참여자 수에 맞춰 총액이 랜덤 차등 분배됩니다 (100원 단위)</div>
    </div>
  </div>

  <div class="controls">
    <button type="button" class="btn btn-go" id="goBtn">🎲 사다리 시작</button>
    <button type="button" class="btn btn-next" id="nextBtn" style="display:none">▶ 다음 참여자</button>
    <button type="button" class="btn btn-reset" id="resetBtn">초기화</button>
    <div id="status" style="display:none"></div>
  </div>

  <div class="stage" id="stage" style="display:none"><canvas id="cv"></canvas></div>
  <div class="results" id="results"></div>
</div>

<script>
(function(){
  "use strict";

  var ANIMALS=['🐶 강아지','🐱 고양이','🦊 여우','🐻 곰','🐼 판다','🐯 호랑이','🦁 사자','🐸 개구리','🐵 원숭이','🐰 토끼','🐨 코알라','🐷 돼지'];

  var players=[], goals=[], L=null;
  var pMode='auto', gMode='money';
  var curIdx=0, busy=false, ended=false;
  var trails=[], reachedGoalCols=[], resultList=[];
  var COLORS=['#4f46e5','#16a34a','#dc2626','#d97706','#0891b2','#db2777','#7c3aed','#0d9488','#ca8a04','#be123c'];

  function $(id){return document.getElementById(id)}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function won(n){return n.toLocaleString('ko-KR')+'원'}

  $('pSeg').addEventListener('click',function(e){
    if(e.target.tagName!=='BUTTON')return;
    pMode=e.target.getAttribute('data-mode');
    setSeg('pSeg',e.target);
    $('pAutoFeed').style.display=pMode==='auto'?'':'none';
    $('pManualFeed').style.display=pMode==='manual'?'':'none';
  });
  $('gSeg').addEventListener('click',function(e){
    if(e.target.tagName!=='BUTTON')return;
    gMode=e.target.getAttribute('data-mode');
    setSeg('gSeg',e.target);
    $('gMoneyFeed').style.display=gMode==='money'?'':'none';
    $('gCustomFeed').style.display=gMode==='custom'?'':'none';
    $('gHint').style.display=gMode==='money'?'':'none';
  });
  function setSeg(segId,btn){
    var bs=$(segId).getElementsByTagName('button');
    for(var i=0;i<bs.length;i++)bs[i].className='';
    btn.className='on';
  }

  function genAnimals(){
    var c=parseInt($('pCount').value,10);
    if(!c||c<2){alert('인원수를 2 이상 입력해주세요.');return}
    if(c>12){c=12;alert('최대 12명까지 가능합니다.')}
    players=shuffle(ANIMALS).slice(0,c);
    drawPlayers();
  }
  function addPlayer(){
    var v=$('pi').value.trim();
    if(!v)return;
    if(players.indexOf(v)>=0){$('pi').value='';return}
    players.push(v);drawPlayers();
    $('pi').value='';$('pi').focus();
  }
  function drawPlayers(){
    var box=$('pchips');
    if(players.length===0){box.innerHTML='<span class="empty">아직 없음</span>'}
    else{box.innerHTML=players.map(function(v,i){return '<span class="chip p">'+esc(v)+'<x data-pi="'+i+'">×</x></span>'}).join('')}
    $('pn').textContent=players.length;
  }

  function splitMoney(){
    if(players.length<2){alert('먼저 참여자를 2명 이상 채워주세요.');return}
    var total=parseInt($('gTotal').value,10);
    if(!total||total<=0){alert('총액을 입력해주세요.');return}
    goals=distribute(total,players.length,100).map(won);
    drawGoals();
    $('gHint').textContent='✓ 총 '+won(total)+'을(를) '+players.length+'명에게 분배했습니다';
  }
  function distribute(total,n,unit){
    var units=Math.floor(total/unit);
    if(units<n){unit=1;units=total}
    var shares=[];for(var i=0;i<n;i++)shares.push(1);
    var remaining=units-n;
    var weights=[],wsum=0;
    for(var i=0;i<n;i++){var w=Math.random()+0.3;weights.push(w);wsum+=w}
    var assigned=0;
    for(var i=0;i<n;i++){var add=Math.floor(remaining*weights[i]/wsum);shares[i]+=add;assigned+=add}
    shares[n-1]+=(remaining-assigned);
    return shares.map(function(s){return s*unit});
  }

  function addGoal(){
    var v=$('gi').value.trim();
    if(!v)return;
    goals.push(v);drawGoals();
    $('gi').value='';$('gi').focus();
  }
  function drawGoals(){
    var box=$('gchips');
    if(goals.length===0){box.innerHTML='<span class="empty">부족하면 꽝 자동 추가</span>'}
    else{box.innerHTML=goals.map(function(v,i){var cls=(v==='꽝')?'bang':'g';return '<span class="chip '+cls+'">'+esc(v)+'<x data-gi="'+i+'">×</x></span>'}).join('')}
    $('gn').textContent=goals.length;
  }

  $('pchips').addEventListener('click',function(e){
    if(e.target.tagName==='X'){players.splice(+e.target.getAttribute('data-pi'),1);drawPlayers()}
  });
  $('gchips').addEventListener('click',function(e){
    if(e.target.tagName==='X'){goals.splice(+e.target.getAttribute('data-gi'),1);drawGoals()}
  });

  function startGame(){
    if(players.length<2){alert('참여자를 2명 이상 채워주세요.');return}
    if(goals.length<1){alert('목표를 1개 이상 설정해주세요.');return}
    var fg=goals.slice();
    while(fg.length<players.length)fg.push('꽝');
    fg=shuffle(fg).slice(0,players.length);
    curIdx=0;busy=false;ended=false;
    trails=[];reachedGoalCols=[];resultList=[];
    buildLadder(fg);
    $('stage').style.display='';
    $('status').style.display='flex';$('status').className='';
    $('nextBtn').style.display='';$('nextBtn').disabled=false;
    $('results').innerHTML='';
    render();
    setStatus('왼쪽 참여자부터 진행합니다. "다음 참여자"를 누르세요.');
  }

  function shuffle(a){
    a=a.slice();
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}
    return a;
  }

  function buildLadder(fg){
    var n=players.length;
    var rows=Math.max(9,n*3+Math.floor(Math.random()*5));
    var hs=[];
    for(var r=1;r<rows;r++){
      var used={};
      for(var c=0;c<n-1;c++){
        if(used[c]||used[c-1])continue;
        if(Math.random()<0.45){hs.push({r:r,c:c});used[c]=1;used[c+1]=1}
      }
    }
    L={n:n,rows:rows,hs:hs,ga:fg};
  }

  var CW=112,CH=42,PX=60,PT=66,PB=70;
  function cx(c){return PX+c*CW}
  function ry(r){return PT+r*CH}
  function ctx2d(){
    var W=PX*2+(L.n-1)*CW,H=PT+L.rows*CH+PB;
    var cv=$('cv');cv.width=Math.max(W,320);cv.height=H;
    return cv.getContext('2d');
  }

  function render(active){
    active=active||[];
    var ctx=ctx2d();
    var W=$('cv').width,H=$('cv').height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

    ctx.strokeStyle='#dadde3';ctx.lineWidth=3;ctx.lineCap='round';
    for(var c=0;c<L.n;c++){ctx.beginPath();ctx.moveTo(cx(c),PT);ctx.lineTo(cx(c),ry(L.rows));ctx.stroke()}
    for(var i=0;i<L.hs.length;i++){var h=L.hs[i];ctx.beginPath();ctx.moveTo(cx(h.c),ry(h.r));ctx.lineTo(cx(h.c+1),ry(h.r));ctx.stroke()}

    ctx.textAlign='center';ctx.textBaseline='middle';
    for(var c=0;c<L.n;c++){
      var isDone=false;
      for(var k=0;k<resultList.length;k++){if(resultList[k].pIdx===c){isDone=true;break}}
      var isCur=(c===curIdx&&!ended&&!isDone);
      if(isCur){
        ctx.font='800 14px sans-serif';
        var tw=ctx.measureText(players[c]).width+20;
        ctx.fillStyle='#eef0fe';roundRect(ctx,cx(c)-tw/2,PT-50,tw,26,8);ctx.fill();
        ctx.fillStyle='#4f46e5';ctx.fillText(players[c],cx(c),PT-37);
        ctx.font='11px sans-serif';ctx.fillText('▼',cx(c),PT-16);
      }else{
        ctx.font='600 13px sans-serif';
        ctx.fillStyle=isDone?'#c3c7cf':'#1a1d23';
        ctx.fillText(players[c],cx(c),PT-32);
      }
    }

    for(var c=0;c<L.n;c++){
      var revealed=reachedGoalCols.indexOf(c)>=0;
      var gname=L.ga[c],isBang=(gname==='꽝');
      var y=ry(L.rows)+12,bw=Math.min(CW-8,98),bh=32,bx=cx(c)-bw/2;
      roundRect(ctx,bx,y,bw,bh,8);
      if(revealed){
        ctx.fillStyle=isBang?'#fdecec':'#e7f8ef';ctx.fill();
        ctx.strokeStyle=isBang?'#f5b5b5':'#a7e8c6';ctx.lineWidth=2;ctx.stroke();
        ctx.fillStyle=isBang?'#c0322f':'#067a4a';ctx.font='700 12px sans-serif';
      }else{
        ctx.fillStyle='#f1f2f5';ctx.fill();
        ctx.strokeStyle='#dadde3';ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle='#b8bcc4';ctx.font='800 15px sans-serif';
      }
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(revealed?gname:'?',cx(c),y+16);
    }

    for(var i=0;i<trails.length;i++)drawTrail(ctx,trails[i].pts,trails[i].ci);
    for(var i=0;i<active.length;i++)drawTrail(ctx,active[i].pts,active[i].ci);
  }

  function drawTrail(ctx,pts,ci){
    if(pts.length<2)return;
    ctx.save();
    ctx.strokeStyle=COLORS[ci%COLORS.length];
    ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
    var last=pts[pts.length-1];
    ctx.fillStyle=COLORS[ci%COLORS.length];
    ctx.beginPath();ctx.arc(last.x,last.y,6,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  }

  function tracePath(startCol){
    var col=startCol;var pts=[{x:cx(col),y:PT}];
    for(var r=1;r<=L.rows;r++){
      var moved=null;
      for(var i=0;i<L.hs.length;i++){var h=L.hs[i];if(h.r===r&&(h.c===col||h.c===col-1)){moved=h;break}}
      if(moved){var nc=(moved.c===col)?col+1:col-1;pts.push({x:cx(col),y:ry(r)});pts.push({x:cx(nc),y:ry(r)});col=nc}
      else{pts.push({x:cx(col),y:ry(r)})}
    }
    return {pts:pts,goalCol:col};
  }

  function animate(pts,ci,onDone){
    var prog=0,SPEED=3.2;
    function frame(){
      prog=Math.min(prog+SPEED,pts.length-1);
      render([{pts:pts.slice(0,Math.floor(prog)+1),ci:ci}]);
      if(prog<pts.length-1)requestAnimationFrame(frame);else onDone();
    }
    requestAnimationFrame(frame);
  }

  function runNext(){
    if(busy||ended||curIdx>=players.length)return;
    var pIdx=curIdx;
    var tr=tracePath(pIdx);
    var gname=L.ga[tr.goalCol],isBang=(gname==='꽝');
    busy=true;$('nextBtn').disabled=true;
    setStatus(players[pIdx]+' 이동 중…');
    animate(tr.pts,pIdx,function(){
      trails.push({pts:tr.pts,ci:pIdx});
      reachedGoalCols.push(tr.goalCol);
      resultList.push({pIdx:pIdx,name:players[pIdx],goal:gname,bang:isBang});
      curIdx++;render();drawResults();busy=false;
      var singleGoal=(goals.length===1);
      if(singleGoal&&!isBang){
        ended=true;$('nextBtn').disabled=true;
        setStatus('🎉 '+players[pIdx]+' "'+gname+'" 당첨! 게임 종료',true);
      }else if(curIdx>=players.length){
        ended=true;$('nextBtn').disabled=true;
        setStatus('✅ 모든 참여자 완료!',true);
      }else{
        $('nextBtn').disabled=false;
        setStatus('다음 참여자: '+players[curIdx]+'  ('+curIdx+'/'+players.length+' 완료)');
      }
    });
  }

  function drawResults(){
    $('results').innerHTML=resultList.map(function(r){
      return '<div class="res"><span class="rn">'+esc(r.name)+'</span><span class="arr">→</span><span class="rg '+(r.bang?'ng':'ok')+'">'+esc(r.goal)+'</span></div>';
    }).join('');
  }
  function setStatus(msg,win){var s=$('status');s.textContent=msg;s.className=win?'win':''}

  function resetAll(){
    players=[];goals=[];L=null;curIdx=0;busy=false;ended=false;
    trails=[];reachedGoalCols=[];resultList=[];
    drawPlayers();drawGoals();
    $('results').innerHTML='';
    $('pi').value='';$('gi').value='';$('pCount').value='';$('gTotal').value='';
    $('gHint').textContent='참여자 수에 맞춰 총액이 랜덤 차등 분배됩니다 (100원 단위)';
    $('stage').style.display='none';$('status').style.display='none';$('nextBtn').style.display='none';
  }

  $('pGen').addEventListener('click',genAnimals);
  $('pAdd').addEventListener('click',addPlayer);
  $('pi').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addPlayer()}});
  $('pCount').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();genAnimals()}});
  $('gSplit').addEventListener('click',splitMoney);
  $('gAdd').addEventListener('click',addGoal);
  $('gi').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addGoal()}});
  $('gTotal').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();splitMoney()}});
  $('goBtn').addEventListener('click',startGame);
  $('nextBtn').addEventListener('click',runNext);
  $('resetBtn').addEventListener('click',resetAll);

  drawPlayers();drawGoals();
})();
</script>
