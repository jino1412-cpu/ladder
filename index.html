<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>사다리 타기 · 실시간</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,sans-serif;background:#eef0f4;color:#1a1d23;min-height:100vh;padding:26px 16px 56px}
.wrap{max-width:980px;margin:0 auto}

.head{text-align:center;margin-bottom:18px}
.head h1{font-size:1.55rem;font-weight:800;letter-spacing:-0.03em}
.head h1 em{color:#4f46e5;font-style:normal}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;margin-top:8px}
.badge.host{background:#eef0fe;color:#3730a3;border:1px solid #c7cbf9}
.badge.guest{background:#e7f8ef;color:#067a4a;border:1px solid #a7e8c6}
.dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block}
.dot.off{background:#cbd0d8}

.card{background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:18px 20px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:14px}
.card-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#9aa0ab;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.card-title .cnt{color:#4f46e5;background:#eef0fe;padding:2px 9px;border-radius:999px;font-size:12px}

.feed{display:flex;gap:8px;margin-bottom:12px}
.feed input{flex:1;padding:10px 13px;border:1px solid #dde0e6;border-radius:9px;font-size:14px;background:#f7f8fa;outline:none;font-family:inherit;transition:.12s}
.feed input:focus{border-color:#4f46e5;background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.feed button{padding:10px 18px;border:none;border-radius:9px;background:#4f46e5;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap}
.feed button:hover{background:#4338ca}
.feed button:active{transform:scale(.96)}
.feed button.gray{background:#fff;color:#64748b;border:1px solid #dde0e6}
.feed button.gray:hover{background:#f1f3f6}

.players{display:flex;flex-wrap:wrap;gap:8px}
.pcard{display:inline-flex;align-items:center;gap:7px;background:#f7f8fa;border:1px solid #e3e5ea;border-radius:999px;padding:7px 14px;font-size:14px;font-weight:600}
.pcard.me{background:#eef0fe;border-color:#c7cbf9;color:#3730a3}
.pcard .me-tag{font-size:10px;font-weight:800;background:#4f46e5;color:#fff;padding:1px 6px;border-radius:5px}
.empty{font-size:13px;color:#b8bcc4;font-style:italic}

.host-panel{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px}
.host-panel input{width:170px;padding:10px 13px;border:1px solid #dde0e6;border-radius:9px;font-size:14px;background:#f7f8fa;outline:none;font-family:inherit}
.host-panel input:focus{border-color:#4f46e5;background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{padding:11px 22px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-go{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.btn-go:hover:not(:disabled){background:#4338ca}
.btn-reset{background:#fff;color:#64748b;border:1px solid #dde0e6}
.btn-reset:hover{background:#f1f3f6}
.hint{font-size:12px;color:#a8acb5;margin-top:10px}
.guest-wait{font-size:13px;color:#6b7280;background:#f7f8fa;border:1px dashed #d5d9e0;border-radius:10px;padding:14px;text-align:center}

.stage{background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:8px;overflow:auto;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
canvas{display:block;margin:0 auto}
#status{font-size:13px;font-weight:600;color:#475569;background:#fff;border:1px solid #e3e5ea;border-radius:11px;padding:11px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
#status.win{background:#e7f8ef;border-color:#a7e8c6;color:#067a4a}

.results{display:flex;flex-wrap:wrap;gap:8px}
.res{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e3e5ea;border-radius:11px;padding:8px 14px;font-size:13px}
.res .rn{font-weight:800}
.res.me .rn{color:#4f46e5}
.res .arr{color:#c3c7cf}
.res .rg{padding:3px 11px;border-radius:999px;font-size:12px;font-weight:700;background:#e7f8ef;color:#067a4a;border:1px solid #a7e8c6}

.conn{position:fixed;top:12px;right:12px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;background:#fff;border:1px solid #e3e5ea;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="conn"><span class="dot off" id="connDot"></span><span id="connText">연결 중…</span></div>

<div class="wrap">
  <div class="head">
    <h1>사다리 <em>타기</em> · 실시간</h1>
    <div id="roleBadge"></div>
  </div>

  <!-- 내 이름 등록 -->
  <div class="card" id="joinCard">
    <div class="card-title"><span>내 이름 등록</span></div>
    <div class="feed">
      <input id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="12" autocomplete="off"/>
      <button type="button" id="joinBtn">등록</button>
    </div>
    <div class="hint" id="joinHint">등록하면 모든 참여자 화면에 실시간으로 표시됩니다.</div>
  </div>

  <!-- 참여자 목록 -->
  <div class="card">
    <div class="card-title"><span>참여자</span><span class="cnt" id="pcnt">0</span></div>
    <div class="players" id="players"><span class="empty">아직 등록한 사람이 없습니다</span></div>
  </div>

  <!-- 호스트 컨트롤 -->
  <div class="card" id="hostCard" style="display:none">
    <div class="card-title"><span>호스트 컨트롤 — 점심값 설정</span></div>
    <div class="host-panel">
      <input id="totalInput" type="number" min="0" step="100" placeholder="총액 (예: 50000)"/>
      <button type="button" class="btn btn-go" id="startBtn">🎲 사다리 시작</button>
      <button type="button" class="btn btn-reset" id="resetBtn">로비로 초기화</button>
    </div>
    <div class="hint">등록된 인원 수만큼 골이 자동 생성되고, 총액이 랜덤 차등 분배됩니다 (100원 단위).</div>
  </div>

  <!-- 게스트 대기 안내 -->
  <div class="card" id="guestWaitCard" style="display:none">
    <div class="guest-wait">호스트가 점심값을 설정하고 시작하기를 기다리는 중입니다…</div>
  </div>

  <!-- 게임 영역 -->
  <div id="gameArea" style="display:none">
    <div id="status"></div>
    <div class="stage"><canvas id="cv"></canvas></div>
    <div class="results" id="results"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  function $(id){return document.getElementById(id)}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  // 내 고유 id (브라우저 세션 기준)
  var MY_ID = 'u' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  var MY_NAME = null;
  var IS_HOST = false;
  var state = null;
  var lastVersion = -1;
  var animDone = false;

  // 호스트 여부 확인
  fetch('/api/whoami').then(function(r){return r.json()}).then(function(d){
    IS_HOST = d.isHost;
    var b=$('roleBadge');
    if(IS_HOST){ b.innerHTML='<span class="badge host">★ 호스트 (이 노트북에서 시작 가능)</span>'; }
    else{ b.innerHTML='<span class="badge guest">참여자</span>'; }
  }).catch(function(){});

  // ── SSE 연결 ──
  function connectSSE(){
    var es = new EventSource('/api/events');
    es.onopen = function(){ setConn(true); };
    es.onerror = function(){ setConn(false); };
    es.onmessage = function(ev){
      try{ var s=JSON.parse(ev.data); applyState(s); }catch(e){}
    };
  }
  function setConn(on){
    $('connDot').className = on?'dot':'dot off';
    $('connText').textContent = on?'실시간 연결됨':'재연결 중…';
  }

  // ── POST 헬퍼 ──
  function post(url, body){
    return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,data:j}})});
  }

  // ── 이름 등록 ──
  function join(){
    var name=$('nameInput').value.trim();
    if(!name){return}
    post('/api/join',{id:MY_ID,name:name}).then(function(res){
      if(res.data && res.data.ok){
        MY_NAME=name;
        $('joinHint').textContent='✓ "'+name+'"(으)로 등록되었습니다. 이름을 바꾸려면 다시 등록하세요.';
      }else{
        alert((res.data && res.data.error) || '등록 실패');
      }
    });
  }

  // ── 상태 반영 ──
  function applyState(s){
    state=s;
    // 참여자 목록
    renderPlayers(s.players);
    $('pcnt').textContent=s.players.length;

    if(s.phase==='lobby'){
      $('joinCard').style.display='';
      $('gameArea').style.display='none';
      $('results').innerHTML='';
      $('status').textContent='';
      if(IS_HOST){ $('hostCard').style.display=''; $('guestWaitCard').style.display='none'; }
      else{ $('hostCard').style.display='none'; $('guestWaitCard').style.display = MY_NAME?'':'none'; }
      lastVersion=-1; animDone=false;
    } else if(s.phase==='running'){
      $('joinCard').style.display='none';
      $('hostCard').style.display = IS_HOST?'':'none';
      $('guestWaitCard').style.display='none';
      $('gameArea').style.display='';
      // 새 게임이면 애니메이션 시작
      if(s.version!==lastVersion && s.ladder){
        lastVersion=s.version;
        startReveal(s);
      }
    }
  }

  function renderPlayers(players){
    var box=$('players');
    if(!players.length){ box.innerHTML='<span class="empty">아직 등록한 사람이 없습니다</span>'; return; }
    box.innerHTML=players.map(function(p){
      var me = (p.id===MY_ID);
      return '<span class="pcard'+(me?' me':'')+'">'+esc(p.name)+(me?'<span class="me-tag">나</span>':'')+'</span>';
    }).join('');
  }

  // ─────────────────────────────────────────
  // 사다리 그리기 (서버가 준 동일 구조)
  // ─────────────────────────────────────────
  var L=null, players=[], trails=[], reached=[], resultList=[];
  var COLORS=['#4f46e5','#16a34a','#dc2626','#d97706','#0891b2','#db2777','#7c3aed','#0d9488','#ca8a04','#be123c'];
  var CW=112,CH=42,PX=60,PT=66,PB=70;
  function cx(c){return PX+c*CW}
  function ry(r){return PT+r*CH}

  function startReveal(s){
    L={n:s.ladder.n,rows:s.ladder.rows,hs:s.ladder.hs,ga:s.ladder.goals};
    players=s.players.map(function(p){return p.name});
    trails=[]; reached=[]; resultList=[];
    render();
    // 왼쪽부터 순차 공개
    revealSeq(0);
  }

  function revealSeq(i){
    if(i>=L.n){
      setStatus('✅ 모든 참여자 완료!',true);
      return;
    }
    var tr=tracePath(i);
    setStatus(players[i]+' 이동 중…');
    animate(tr.pts,i,function(){
      trails.push({pts:tr.pts,ci:i});
      reached.push(tr.goalCol);
      resultList.push({pIdx:i,name:players[i],goal:L.ga[tr.goalCol]});
      render(); drawResults();
      if(i+1<L.n) setStatus('다음 참여자: '+players[i+1]+'  ('+(i+1)+'/'+L.n+' 완료)');
      setTimeout(function(){revealSeq(i+1)},250);
    });
  }

  function render(active){
    active=active||[];
    var W=PX*2+(L.n-1)*CW, H=PT+L.rows*CH+PB;
    var cv=$('cv'); cv.width=Math.max(W,320); cv.height=H;
    var ctx=cv.getContext('2d');
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

    ctx.strokeStyle='#dadde3'; ctx.lineWidth=3; ctx.lineCap='round';
    for(var c=0;c<L.n;c++){ctx.beginPath();ctx.moveTo(cx(c),PT);ctx.lineTo(cx(c),ry(L.rows));ctx.stroke()}
    for(var i=0;i<L.hs.length;i++){var h=L.hs[i];ctx.beginPath();ctx.moveTo(cx(h[1]),ry(h[0]));ctx.lineTo(cx(h[1]+1),ry(h[0]));ctx.stroke()}

    ctx.textAlign='center'; ctx.textBaseline='middle';
    var curIdx=resultList.length;
    for(var c=0;c<L.n;c++){
      var isDone=false;
      for(var k=0;k<resultList.length;k++){if(resultList[k].pIdx===c){isDone=true;break}}
      var isCur=(c===curIdx);
      if(isCur){
        ctx.font='800 14px sans-serif';
        var tw=ctx.measureText(players[c]).width+20;
        ctx.fillStyle='#eef0fe'; roundRect(ctx,cx(c)-tw/2,PT-50,tw,26,8); ctx.fill();
        ctx.fillStyle='#4f46e5'; ctx.fillText(players[c],cx(c),PT-37);
        ctx.font='11px sans-serif'; ctx.fillText('▼',cx(c),PT-16);
      }else{
        ctx.font='600 13px sans-serif';
        ctx.fillStyle=isDone?'#c3c7cf':'#1a1d23';
        ctx.fillText(players[c],cx(c),PT-32);
      }
    }

    for(var c=0;c<L.n;c++){
      var revealed=reached.indexOf(c)>=0;
      var y=ry(L.rows)+12,bw=Math.min(CW-8,98),bh=32,bx=cx(c)-bw/2;
      roundRect(ctx,bx,y,bw,bh,8);
      if(revealed){
        ctx.fillStyle='#e7f8ef'; ctx.fill();
        ctx.strokeStyle='#a7e8c6'; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle='#067a4a'; ctx.font='700 12px sans-serif';
        ctx.fillText(L.ga[c],cx(c),y+16);
      }else{
        ctx.fillStyle='#f1f2f5'; ctx.fill();
        ctx.strokeStyle='#dadde3'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle='#b8bcc4'; ctx.font='800 15px sans-serif';
        ctx.fillText('?',cx(c),y+16);
      }
    }

    for(var i=0;i<trails.length;i++)drawTrail(ctx,trails[i].pts,trails[i].ci);
    for(var i=0;i<active.length;i++)drawTrail(ctx,active[i].pts,active[i].ci);
  }

  function drawTrail(ctx,pts,ci){
    if(pts.length<2)return;
    ctx.save();
    ctx.strokeStyle=COLORS[ci%COLORS.length];
    ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
    var last=pts[pts.length-1];
    ctx.fillStyle=COLORS[ci%COLORS.length];
    ctx.beginPath();ctx.arc(last.x,last.y,6,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  }

  function tracePath(startCol){
    var col=startCol;var pts=[{x:cx(col),y:PT}];
    for(var r=1;r<=L.rows;r++){
      var moved=null;
      for(var i=0;i<L.hs.length;i++){var h=L.hs[i];if(h[0]===r&&(h[1]===col||h[1]===col-1)){moved=h;break}}
      if(moved){var nc=(moved[1]===col)?col+1:col-1;pts.push({x:cx(col),y:ry(r)});pts.push({x:cx(nc),y:ry(r)});col=nc}
      else{pts.push({x:cx(col),y:ry(r)})}
    }
    return {pts:pts,goalCol:col};
  }

  function animate(pts,ci,onDone){
    var prog=0,SPEED=3.4;
    function frame(){
      prog=Math.min(prog+SPEED,pts.length-1);
      render([{pts:pts.slice(0,Math.floor(prog)+1),ci:ci}]);
      if(prog<pts.length-1)requestAnimationFrame(frame);else onDone();
    }
    requestAnimationFrame(frame);
  }

  function drawResults(){
    $('results').innerHTML=resultList.map(function(r){
      var me=(players[r.pIdx]===MY_NAME);
      return '<div class="res'+(me?' me':'')+'"><span class="rn">'+esc(r.name)+'</span><span class="arr">→</span><span class="rg">'+esc(r.goal)+'</span></div>';
    }).join('');
  }
  function setStatus(msg,win){var s=$('status');s.textContent=msg;s.className=win?'win':''}

  // ── 호스트 액션 ──
  function start(){
    var total=parseInt($('totalInput').value,10);
    if(!total||total<=0){alert('점심값 총액을 입력하세요.');return}
    post('/api/start',{total:total}).then(function(res){
      if(!(res.data&&res.data.ok)) alert((res.data&&res.data.error)||'시작 실패');
    });
  }
  function reset(){ post('/api/reset',{}); }

  // ── 이벤트 ──
  $('joinBtn').addEventListener('click',join);
  $('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();join()}});
  $('startBtn').addEventListener('click',start);
  $('totalInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();start()}});
  $('resetBtn').addEventListener('click',reset);
  window.addEventListener('beforeunload',function(){
    try{navigator.sendBeacon('/api/leave', JSON.stringify({id:MY_ID}))}catch(e){}
  });

  connectSSE();
})();
</script>
</body>
</html>
